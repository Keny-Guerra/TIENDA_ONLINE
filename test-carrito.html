<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Carrito de Compras</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-box {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .test-box h3 {
            margin: 0 0 10px 0;
            color: #667eea;
        }
        .result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-family: monospace;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <h1>🧪 Test - Carrito de Compras</h1>

    <div class="test-box">
        <h3>1. Verificar API</h3>
        <button onclick="testAPI()">Test API</button>
        <div id="api-result"></div>
    </div>

    <div class="test-box">
        <h3>2. Verificar Métodos de Pago</h3>
        <button onclick="testPaymentMethods()">Test Métodos</button>
        <div id="methods-result"></div>
    </div>

    <div class="test-box">
        <h3>3. Verificar LocalStorage</h3>
        <button onclick="testLocalStorage()">Test LocalStorage</button>
        <div id="storage-result"></div>
    </div>

    <div class="test-box">
        <h3>4. Simular Pago Completo</h3>
        <button onclick="testCompletFlow()">Test Flujo Completo</button>
        <div id="flow-result"></div>
    </div>

    <div class="test-box">
        <h3>5. Abrir Consola del Navegador</h3>
        <p>Presiona <strong>F12</strong> para abrir la consola</p>
        <button onclick="openConsoleInstructions()">Ver Instrucciones</button>
        <div id="console-result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        async function testAPI() {
            const result = document.getElementById('api-result');
            result.innerHTML = '⏳ Probando...';
            try {
                const response = await fetch(`${API_URL}/productos`);
                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `<div class="result success">✅ API funcionando | ${data.length} productos</div>`;
                } else {
                    result.innerHTML = `<div class="result error">❌ API error: ${response.status}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }

        async function testPaymentMethods() {
            const result = document.getElementById('methods-result');
            const methods = ['tarjeta', 'yape', 'plin', 'transferencia', 'efectivo'];
            let html = '<div class="result success">✅ Métodos encontrados:<br>';
            methods.forEach(m => {
                html += `${m} `;
            });
            html += '</div>';
            result.innerHTML = html;
        }

        async function testLocalStorage() {
            const result = document.getElementById('storage-result');
            const user = localStorage.getItem('usuarioActual');
            const sesion = localStorage.getItem('sesionId');

            if (user) {
                const userData = JSON.parse(user);
                result.innerHTML = `<div class="result success">
                    ✅ Usuario logueado: ${userData.nombres} ${userData.apellidos}<br>
                    📧 Email: ${userData.email}<br>
                    👤 Rol: ${userData.role}<br>
                    🆔 Sesión: ${sesion}
                </div>`;
            } else {
                result.innerHTML = `<div class="result error">❌ No hay usuario logueado<br>Inicia sesión primero</div>`;
            }
        }

        async function testCompletFlow() {
            const result = document.getElementById('flow-result');
            result.innerHTML = '⏳ Probando flujo completo...';

            try {
                // 1. Verificar usuario
                const user = localStorage.getItem('usuarioActual');
                if (!user) {
                    result.innerHTML = `<div class="result error">❌ No hay usuario logueado</div>`;
                    return;
                }
                const userData = JSON.parse(user);

                // 2. Crear pedido
                const response = await fetch(`${API_URL}/pedidos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cliente_nombre: userData.nombres + ' ' + userData.apellidos,
                        cliente_email: userData.email,
                        cliente_telefono: userData.telefono || '999999999',
                        items: [{ producto_id: 1, cantidad: 1, precio: 159.90 }],
                        proveedor_id: 1
                    })
                });

                if (response.ok) {
                    const pedido = await response.json();
                    result.innerHTML = `<div class="result success">
                        ✅ Pedido creado exitosamente!<br>
                        📦 ID: ${pedido.id}<br>
                        🔖 Código: ${pedido.codigoPedido}<br>
                        💰 Total: S/ ${pedido.total}<br>
                        ✔️ Estado: ${pedido.estado}
                    </div>`;
                } else {
                    const error = await response.text();
                    result.innerHTML = `<div class="result error">❌ Error al crear pedido: ${response.status}<br>${error}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }

        function openConsoleInstructions() {
            const result = document.getElementById('console-result');
            result.innerHTML = `
                <div class="result success">
                    <strong>Instrucciones para abrir la consola:</strong><br><br>
                    1️⃣ Presiona <strong>F12</strong> en tu teclado<br>
                    2️⃣ Ve a la pestaña <strong>"Console"</strong><br>
                    3️⃣ Ahora vuelve a:
                    <ul>
                        <li>Inicia sesión</li>
                        <li>Agrega productos al carrito</li>
                        <li>Abre el carrito → "PROCEDER AL PAGO"</li>
                        <li>Selecciona un método de pago</li>
                        <li>Haz clic en "PAGAR AHORA"</li>
                    </ul>
                    4️⃣ Mira los logs en la consola (F12)<br>
                    5️⃣ Copia todo lo que veas y cuéntame<br><br>
                    <strong>Logs que deberías ver:</strong><br>
                    ✅ Método seleccionado: (método)<br>
                    ✅ procesarPago() llamada<br>
                    ✅ Pedido creado: {...}
                </div>
            `;
        }

        // Auto-ejecutar al cargar
        window.onload = function() {
            console.log('🧪 Test Carrito - Página de Diagnóstico');
            console.log('Haz clic en los botones para probar cada componente');
        };
    </script>
</body>
</html>
